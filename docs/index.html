<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bowling Scorer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎳</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --panel: rgba(10, 15, 26, 0.78);
    --panel-border: rgba(255, 255, 255, 0.10);
    --ink: #e8ecf4;
    --ink-dim: #8b93a7;
    --accent: #2dd4bf;
    --accent-2: #f59e0b;
    --danger: #f87171;
    --ok: #4ade80;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { color-scheme: dark; }
  body {
    background: #05070d;
    color: var(--ink);
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ============ the lane fills the whole screen ============ */
  #lane { position: fixed; inset: 0; z-index: 0; display: block; }

  /* ============ floating HUD ============ */
  .hud {
    position: relative; z-index: 2;
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 14px 14px; gap: 10px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
    position: relative;
  }
  .tag {
    position: absolute; top: -9px; left: 14px;
    font-size: 10.5px; font-weight: 800; letter-spacing: 0.16em;
    color: var(--accent);
    background: #0b1420;
    border: 1px solid rgba(45, 212, 191, 0.4);
    padding: 2px 9px; border-radius: 999px;
    pointer-events: none;
  }

  /* top bar */
  .topbar { width: 100%; display: flex; justify-content: center; gap: 10px; }
  .brand {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12.5px; font-weight: 700;
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 999px; padding: 7px 14px;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  .brand small { color: var(--ink-dim); font-weight: 500; }

  /* colorful gradient borders on the main panels */
  .scoreboard, .padpanel, .testspanel {
    border: 1px solid transparent;
    background:
      linear-gradient(var(--panel), var(--panel)) padding-box,
      linear-gradient(120deg, rgba(45, 212, 191, 0.55), rgba(245, 158, 11, 0.40), rgba(244, 114, 182, 0.45)) border-box;
  }

  /* scoreboard marquee */
  .scoreboard { padding: 16px 16px 12px; max-width: 100%; }
  .scorewrap { display: flex; align-items: center; gap: 14px; }
  .scorecard-scroll { overflow-x: auto; scrollbar-width: thin; scroll-behavior: smooth; }
  .scorecard { display: grid; grid-template-columns: repeat(9, 1fr) 1.4fr; gap: 5px; min-width: 620px; }
  .frame {
    border: 1px solid var(--panel-border); border-radius: 9px;
    background: rgba(255, 255, 255, 0.03); padding: 4px 3px 6px;
    text-align: center; transition: border-color 0.25s, box-shadow 0.25s;
  }
  .frame.active { border-color: var(--accent); animation: framepulse 1.6s ease-in-out infinite; }
  @keyframes framepulse {
    0%, 100% { box-shadow: 0 0 0 1px var(--accent), 0 0 12px rgba(45, 212, 191, 0.18); }
    50% { box-shadow: 0 0 0 1.5px var(--accent), 0 0 26px rgba(45, 212, 191, 0.45); }
  }
  @keyframes cumpop { 0% { transform: scale(1.7); filter: brightness(2.2); } 100% { transform: scale(1); } }
  .frame .cum.pop { animation: cumpop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .total .value.pop { animation: cumpop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .frame .num { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: var(--ink-dim); margin-bottom: 4px; }
  .frame.active .num { color: var(--accent); }
  .rolls { display: flex; gap: 3px; justify-content: center; margin-bottom: 4px; }
  .rollbox {
    width: 19px; height: 22px; border-radius: 5px;
    border: 1px solid var(--panel-border); background: rgba(0, 0, 0, 0.3);
    display: flex; align-items: center; justify-content: center;
    font-family: "JetBrains Mono", monospace; font-size: 11.5px; font-weight: 600;
  }
  .rollbox.mark { color: var(--accent-2); }
  .frame .cum { font-size: 14px; font-weight: 700; min-height: 17px; font-variant-numeric: tabular-nums; }
  .frame .cum.pending { color: var(--ink-dim); font-weight: 400; }
  .total { text-align: center; padding: 0 6px; }
  .total .label { color: var(--ink-dim); font-size: 9.5px; font-weight: 800; letter-spacing: 0.14em; }
  .total .value {
    font-size: 38px; font-weight: 800; letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums; line-height: 1.05;
    color: var(--accent);
    text-shadow: 0 0 18px rgba(45, 212, 191, 0.45);
  }

  .spacer { flex: 1 1 auto; min-height: 34vh; pointer-events: none; }

  .lanetag {
    position: fixed; left: 12px; top: 50%; transform: rotate(-90deg) translateX(-50%);
    transform-origin: left center;
    font-size: 9.5px; font-weight: 800; letter-spacing: 0.22em; color: rgba(139, 147, 167, 0.6);
    pointer-events: none; z-index: 1;
  }

  /* pad */
  .padpanel { padding: 18px 18px 14px; text-align: center; max-width: 640px; }
  #status {
    font-size: 20px; font-weight: 800; margin-bottom: 14px; min-height: 27px; letter-spacing: -0.01em;
    background: linear-gradient(92deg, #2dd4bf, #7dd3fc, #f59e0b, #f472b6, #2dd4bf);
    background-size: 320%;
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: statusflow 6s linear infinite, statusbob 2.6s ease-in-out infinite;
  }
  @keyframes statusflow { to { background-position: 320% center; } }
  @keyframes statusbob { 50% { transform: translateY(-2px) scale(1.015); } }
  #status.perfect {
    font-weight: 800; font-size: 18px;
    background: linear-gradient(92deg, var(--accent-2), #fde68a, var(--accent-2));
    background-size: 200%; -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: shimmer 2s linear infinite;
  }
  @keyframes shimmer { to { background-position: 200% center; } }
  #status.error { background: none; color: var(--danger); animation: none; }
  #status.done { background: none; color: var(--ok); animation: none; }
  .pad { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .padrow { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; }
  .key {
    min-width: 46px; height: 46px; padding: 0 12px;
    border-radius: 12px; border: 1px solid var(--panel-border);
    background: rgba(255, 255, 255, 0.06); color: var(--ink);
    font-family: "JetBrains Mono", monospace; font-size: 17px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .key:hover:not(:disabled) { background: rgba(45, 212, 191, 0.16); border-color: var(--accent); transform: translateY(-2px); }
  .key:active:not(:disabled) { transform: translateY(0); }
  .key:disabled { opacity: 0.32; cursor: not-allowed; }
  .key.special { color: var(--accent-2); }
  .key.util { font-family: "Inter", sans-serif; font-size: 12.5px; font-weight: 600; color: var(--ink-dim); }
  .key.util:hover:not(:disabled) { color: var(--ink); background: rgba(255, 255, 255, 0.1); border-color: var(--panel-border); }
  .chips { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; margin-top: 11px; }
  .chips .lbl { font-size: 11.5px; color: var(--ink-dim); align-self: center; font-weight: 600; }
  .chip {
    border: 1px solid var(--panel-border); background: transparent; color: var(--ink-dim);
    font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 999px;
    cursor: pointer; transition: all 0.15s; font-family: "Inter", sans-serif;
  }
  .chip:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.3); }
  .chip:disabled { opacity: 0.3; cursor: not-allowed; }
  .chip-example { color: #2dd4bf; border-color: rgba(45, 212, 191, 0.45); }
  .chip-perfect { color: #f59e0b; border-color: rgba(245, 158, 11, 0.45); }
  .chip-spares { color: #f472b6; border-color: rgba(244, 114, 182, 0.45); }

  /* tests — a normal panel at the very bottom of the page */
  .testspanel {
    width: min(760px, 100%);
    padding: 20px 18px 16px;
    margin-top: 4px;
  }
  .tests-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .tests-head h2 { font-size: 15.5px; font-weight: 700; }
  .tests-head p { color: var(--ink-dim); font-size: 12.5px; margin-top: 2px; }
  .tests-head p code {
    font-family: "JetBrains Mono", monospace; font-size: 11px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--panel-border);
    padding: 1px 6px; border-radius: 5px; color: var(--accent);
  }
  .runbtn {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(92deg, var(--accent), #14b8a6);
    color: #052e2b; border: none; border-radius: 11px;
    font-family: "Inter", sans-serif; font-size: 13.5px; font-weight: 700;
    padding: 10px 18px; cursor: pointer; transition: all 0.15s;
  }
  .runbtn:hover:not(:disabled) { filter: brightness(1.1); }
  .runbtn:disabled { opacity: 0.5; cursor: wait; }
  .badge {
    font-family: "JetBrains Mono", monospace; font-size: 12px; font-weight: 600;
    padding: 4px 11px; border-radius: 999px; display: none;
  }
  .badge.pass { display: inline-block; color: var(--ok); background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.35); }
  .badge.fail { display: inline-block; color: var(--danger); background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.35); }
  #term {
    display: none; margin-top: 13px; padding: 13px 15px; border-radius: 11px;
    background: #04060b; border: 1px solid var(--panel-border);
    font-family: "JetBrains Mono", monospace; font-size: 11.5px; line-height: 1.6;
    white-space: pre-wrap; word-break: break-word;
    color: #aab3c5;
  }
  #term .pass { color: var(--ok); }
  #term .fail { color: var(--danger); }

  /* loader */
  #loader {
    position: fixed; inset: 0; z-index: 10;
    background: rgba(5, 7, 13, 0.72);
    display: flex; align-items: center; justify-content: center; gap: 12px;
    color: var(--ink); font-size: 15px; font-weight: 600;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    transition: opacity 0.4s;
  }
  #loader .dot {
    width: 10px; height: 10px; border-radius: 50%; background: var(--accent);
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: 0.2; transform: scale(0.7); } }

  @media (max-width: 760px) {
    .spacer { min-height: 40vh; }
    .brand small { display: none; }
    .total .value { font-size: 30px; }
    .lanetag { display: none; }
  }
</style>
</head>
<body>

<canvas id="lane"></canvas>
<div class="lanetag">— THE LANE —</div>

<div class="hud">

  <div class="topbar">
    <span class="brand">🎳 Bowling Scorer <small>· real Python in your browser</small></span>
  </div>

  <section class="panel scoreboard">
    <span class="tag">SCOREBOARD</span>
    <div class="scorewrap">
      <div class="scorecard-scroll"><div class="scorecard" id="scorecard"></div></div>
      <div class="total">
        <div class="label">TOTAL</div>
        <div class="value" id="totalval">0</div>
      </div>
    </div>
  </section>

  <div class="spacer"></div>

  <section class="panel padpanel">
    <span class="tag">YOUR BUTTONS</span>
    <div id="status">Tap a number to roll your first ball!</div>
    <div class="pad">
      <div class="padrow" id="digitrow"></div>
      <div class="padrow">
        <button class="key special" id="key-x" title="Strike — all 10 pins!">X</button>
        <button class="key special" id="key-slash" title="Spare — the rest of the pins!">/</button>
        <button class="key util" id="key-undo">⌫ Undo</button>
        <button class="key util" id="key-reset">Reset</button>
      </div>
    </div>
    <div class="chips">
      <span class="lbl">Watch a famous game:</span>
      <button class="chip chip-example" data-game="example">Example · 149</button>
      <button class="chip chip-perfect" data-game="perfect">Perfect · 300</button>
      <button class="chip chip-spares" data-game="spares">All spares · 150</button>
    </div>
  </section>

  <section class="panel testspanel" id="testspanel">
    <span class="tag">TESTS</span>
    <div class="tests-head">
      <div>
        <h2>Run the real pytest suite</h2>
        <p><code>test_bowling.py</code> vs <code>bowling.py</code> — right here in your browser.</p>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="badge" id="testbadge"></span>
        <button class="runbtn" id="runtests">▶ Run pytest</button>
      </div>
    </div>
    <div id="term"></div>
  </section>

</div>

<div id="loader"><span class="dot"></span> Loading the Python runtime…</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<script>
"use strict";

/* ------------------------------------------------ state */
const state = { rolls: [], ready: false };
let pyodide = null;
let testSource = "";
let micropipReady = false;
let lastCelebrated = "";

const GAMES = {
  example: ["8","/","5","4","9","0","X","X","5","/","5","3","6","3","9","/","9","/","X"],
  perfect: Array(12).fill("X"),
  spares:  [..."5/".repeat(10)].concat(["5"]),
};

/* ------------------------------------------------ frame analysis (display + input rules only; scoring is Python's job) */
function analyze(rolls) {
  const frames = [];
  let i = 0;
  for (let f = 0; f < 9; f++) {
    if (i >= rolls.length) { frames.push([]); continue; }
    if (rolls[i].toUpperCase() === "X") { frames.push([rolls[i]]); i += 1; }
    else { frames.push(rolls.slice(i, i + 2)); i += 2; }
  }
  const t = rolls.slice(i).map(s => s.toUpperCase());
  frames.push(rolls.slice(i));

  const done = t.length === 3 || (t.length === 2 && t[0] !== "X" && t[1] !== "/");

  let frameIdx = 9, fresh = true, standing = 10;
  for (let f = 0; f < 9; f++) {
    const fr = frames[f];
    if (fr.length === 0) { frameIdx = f; break; }
    if (fr.length === 1 && fr[0].toUpperCase() !== "X") {
      frameIdx = f; fresh = false; standing = 10 - Number(fr[0]); break;
    }
  }
  if (frameIdx === 9 && !done) {
    if (t.length === 1) {
      if (t[0] === "X") { fresh = true; }
      else { fresh = false; standing = 10 - Number(t[0]); }
    } else if (t.length === 2) {
      if (t[1] === "X" || t[1] === "/") { fresh = true; }
      else { fresh = false; standing = 10 - Number(t[1]); }
    }
  }
  return { frames, done, frameIdx, fresh, standing };
}

/* ------------------------------------------------ python bridge */
function pyPartialScores(rolls) {
  pyodide.globals.set("_rolls", pyodide.toPy(rolls));
  return JSON.parse(pyodide.runPython("json.dumps(partial_scores(list(_rolls)))"));
}
function pyFinalScore(rolls) {
  pyodide.globals.set("_rolls", pyodide.toPy(rolls));
  return JSON.parse(pyodide.runPython("json.dumps(ui_score(list(_rolls)))"));
}

/* ================================================= LANE — full-screen game scene */
const laneCv = document.getElementById("lane");
const lctx = laneCv.getContext("2d");
const DPR = Math.min(window.devicePixelRatio || 1, 2);
const RM = matchMedia("(prefers-reduced-motion: reduce)").matches;
const SPEED = RM ? 6 : 1;
const CONF_COLORS = ["#2dd4bf", "#f59e0b", "#f472b6", "#a78bfa", "#4ade80", "#fde68a"];

const lane = {
  up: Array(10).fill(true),
  pop: Array(10).fill(1),
  flying: [], sparks: [], confetti: [],
  ball: null, splash: null, rackAnim: null,
  shake: 0, busy: false, t: 0, stormUntil: 0,
};

/* ambient neon specks drifting up the room (positions as viewport fractions) */
const AMBIENT = Array.from({ length: 34 }, (_, i) => ({
  fx: Math.random(), fy: Math.random(),
  speed: 0.008 + Math.random() * 0.02,
  size: 1.5 + Math.random() * 2.5,
  phase: Math.random() * 6.28,
  color: CONF_COLORS[i % CONF_COLORS.length],
}));

const geom = {};
function layout() {
  const W = window.innerWidth, H = window.innerHeight;
  geom.W = W; geom.H = H; geom.CX = W / 2;
  laneCv.width = Math.round(W * DPR);
  laneCv.height = Math.round(H * DPR);
  laneCv.style.width = W + "px";
  laneCv.style.height = H + "px";
  lctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  const base = Math.max(42, Math.min(92, H * 0.085));
  geom.base = base;
  /* the pin deck must sit below the floating scoreboard */
  const board = document.querySelector(".scoreboard");
  const panelsBottom = board ? board.getBoundingClientRect().bottom : H * 0.2;
  const headY = Math.min(H * 0.58, Math.max(H * 0.30, panelsBottom + base * 2.9));
  const offs = [[0], [-0.5, 0.5], [-1, 0, 1], [-1.5, -0.5, 0.5, 1.5]];
  const pos = [];
  for (let r = 0; r < 4; r++) {
    const s = base * (1 - r * 0.055);
    const y = headY - r * base * 0.60;
    const gap = s * 1.14;
    for (const o of offs[r]) pos.push({ x: geom.CX + o * gap, y, s });
  }
  geom.PIN_POS = pos;                       // index 0 = head pin (front)
  geom.deckTopY = pos[9].y - base;
  geom.halfTop = 1.5 * (base * 0.835 * 1.14) + base * 0.55;
  geom.halfBottom = Math.min(W * 0.44, geom.halfTop * 2.4);
  geom.gutterW = base * 0.34;
  geom.ballR = base * 0.30;
  geom.splashY = Math.min(H * 0.64, headY + base * 2.6);
  geom.arrowsY = headY + (H - headY) * 0.36;
  geom.dotsY = headY + (H - headY) * 0.60;

  /* a ball already in flight must re-aim at the pins' new positions */
  const b = lane.ball;
  if (b && !b.hit && !b.gutter) {
    b.targetX = b.fallIdx.reduce((s, i) => s + pos[i].x, 0) / b.fallIdx.length;
    b.impactY = pos[b.fallIdx[0]].y - base * 0.18;
  }
}
layout();
window.addEventListener("resize", layout);

function laneHalf(y) {
  const { deckTopY, halfTop, halfBottom, H } = geom;
  if (y <= deckTopY) return halfTop;
  return halfTop + (halfBottom - halfTop) * (y - deckTopY) / (H - deckTopY);
}

function laneSync(standingCount) {
  const downed = 10 - standingCount;
  for (let i = 0; i < 10; i++) { lane.up[i] = i >= downed; lane.pop[i] = 1; }
  lane.flying = []; lane.ball = null; lane.rackAnim = null;
}

function laneRack() {
  lane.rackAnim = { start: lane.t };
  for (let i = 0; i < 10; i++) {
    if (!lane.up[i]) { lane.up[i] = true; lane.pop[i] = -(0.95 + i * 0.12); }
  }
}

/* full rack duration in seconds (sweep bar + all pins fully grown) */
const RACK_SECS = 0.95 / SPEED;

function laneSplash(text, color) { lane.splash = { text, color, born: lane.t }; }

function confettiBurst(n) {
  const { CX, H } = geom;
  for (let k = 0; k < n; k++) {
    lane.confetti.push({
      x: CX + (Math.random() * 300 - 150), y: H * 0.18 + Math.random() * H * 0.2,
      vx: Math.random() * 220 - 110, vy: -80 - Math.random() * 160,
      rot: Math.random() * 6, vr: Math.random() * 10 - 5,
      color: CONF_COLORS[k % CONF_COLORS.length],
      life: 1.6 + Math.random() * 0.8, size: 4 + Math.random() * 6,
    });
  }
}

function laneRoll(sym, standingBefore, onImpact, onSettled) {
  const knocked = sym === "X" ? 10 : sym === "/" ? standingBefore : Number(sym);
  const downFrom = 10 - standingBefore;
  const fallIdx = [];
  for (let i = downFrom; i < 10 && fallIdx.length < knocked; i++) fallIdx.push(i);
  const gutter = knocked === 0;
  const { CX, W, H, PIN_POS, base } = geom;
  const targetX = gutter
    ? CX  /* gutter balls drift to the edge dynamically */
    : fallIdx.reduce((s, i) => s + PIN_POS[i].x, 0) / fallIdx.length + (Math.random() * base * 0.14 - base * 0.07);
  const impactY = gutter ? H * 0.42 : PIN_POS[fallIdx[0]].y - base * 0.18;
  lane.ball = {
    startX: CX + (Math.random() * W * 0.08 - W * 0.04),
    startY: H + geom.ballR,
    x: 0, y: H + geom.ballR,
    targetX, impactY, fallIdx, gutter, sym, knocked,
    v: Math.max(620, H * 1.15) * SPEED,
    hookDir: Math.random() < 0.5 ? -1 : 1,
    gutterSide: Math.random() < 0.5 ? -1 : 1,
    rot: 0, hit: false, trail: [],
    onImpact, onSettled,
  };
  lane.ball.x = lane.ball.startX;
  lane.busy = true;
}

function laneImpact(ball) {
  ball.hit = true;
  const { PIN_POS, base, H } = geom;
  if (!ball.gutter) {
    for (const i of ball.fallIdx) {
      lane.up[i] = false;
      const p = PIN_POS[i];
      lane.flying.push({
        x: p.x, y: p.y - p.s * 0.5, s: p.s,
        vx: (p.x - ball.x) * 9 + (Math.random() * base * 4 - base * 2),
        vy: -(H * 0.55) - Math.random() * H * 0.5,
        rot: 0, vr: Math.random() * 16 - 8, life: 1.05,
      });
    }
    for (let k = 0; k < 16; k++) {
      lane.sparks.push({
        x: ball.x + (Math.random() * base - base / 2), y: ball.impactY - base * 0.3,
        vx: Math.random() * 500 - 250, vy: -Math.random() * 420,
        life: 0.25 + Math.random() * 0.3,
      });
    }
  }
  const up = ball.sym.toUpperCase();
  if (up === "X") { lane.shake = 16; laneSplash("STRIKE!", "#f59e0b"); confettiBurst(48); }
  else if (up === "/") { lane.shake = 9; laneSplash("SPARE!", "#2dd4bf"); confettiBurst(28); }
  else if (ball.gutter) { laneSplash("GUTTER…", "#8b93a7"); }
  else if (ball.knocked >= 8) { lane.shake = 6; laneSplash("NICE!", "#e8ecf4"); }
  else { lane.shake = Math.min(4, ball.knocked * 0.5); }
  ball.onImpact && ball.onImpact();
  setTimeout(() => { const cb = ball.onSettled; ball.onSettled = null; cb && cb(); }, 640 / SPEED);
}

function laneTick(dt) {
  lane.t += dt;
  lane.shake = Math.max(0, lane.shake - dt * 34);
  const { H, W, deckTopY, gutterW } = geom;

  const b = lane.ball;
  if (b) {
    b.trail.push([b.x, b.y]);
    if (b.trail.length > 11) b.trail.shift();
    b.y -= b.v * dt;
    b.rot += dt * 9;
    const p = Math.max(0, Math.min(1, (b.startY - b.y) / (b.startY - b.impactY)));
    if (b.gutter) {
      const edgeX = geom.CX + b.gutterSide * (laneHalf(b.y) + gutterW * 0.55);
      b.x += (edgeX - b.x) * Math.min(1, p * 2.2 + dt * 2);
    } else {
      const ease = p * p * (3 - 2 * p);
      b.x = b.startX + (b.targetX - b.startX) * ease
          + Math.sin(Math.PI * p) * W * 0.045 * b.hookDir * (1 - ease);
    }
    if (!b.hit && b.y <= b.impactY) laneImpact(b);
    if (b.y < deckTopY - geom.base) lane.ball = null;
  }

  for (let i = 0; i < 10; i++) {
    if (lane.up[i] && lane.pop[i] < 1) lane.pop[i] = Math.min(1, lane.pop[i] + dt * 3.4 * SPEED);
  }
  if (lane.rackAnim && (lane.t - lane.rackAnim.start) * SPEED > 0.85) lane.rackAnim = null;

  lane.flying = lane.flying.filter(p => (
    p.x += p.vx * dt, p.y += p.vy * dt, p.vy += H * 1.1 * dt,
    p.vx *= 0.99, p.rot += p.vr * dt, p.life -= dt * 0.95, p.life > 0));
  lane.sparks = lane.sparks.filter(p => (
    p.x += p.vx * dt, p.y += p.vy * dt, p.life -= dt * 2.4, p.life > 0));
  lane.confetti = lane.confetti.filter(p => (
    p.x += p.vx * dt, p.y += p.vy * dt, p.vy += 340 * dt,
    p.rot += p.vr * dt, p.life -= dt * 0.6, p.life > 0 && p.y < H + 20));
  if (lane.t < lane.stormUntil) {
    for (let k = 0; k < 3; k++) {
      lane.confetti.push({
        x: Math.random() * W, y: -12,
        vx: Math.random() * 120 - 60, vy: 60 + Math.random() * 160,
        rot: Math.random() * 6, vr: Math.random() * 10 - 5,
        color: CONF_COLORS[(Math.random() * CONF_COLORS.length) | 0],
        life: 2.4, size: 4 + Math.random() * 6,
      });
    }
  }
  if (lane.splash && lane.t - lane.splash.born > 1.2) lane.splash = null;
}

/* -------- sprites -------- */
function pinPath() {
  lctx.beginPath();
  lctx.moveTo(-0.115, 0.5);
  lctx.bezierCurveTo(-0.30, 0.28, -0.22, 0.02, -0.08, -0.10);
  lctx.bezierCurveTo(-0.20, -0.24, -0.16, -0.46, 0, -0.46);
  lctx.bezierCurveTo(0.16, -0.46, 0.20, -0.24, 0.08, -0.10);
  lctx.bezierCurveTo(0.22, 0.02, 0.30, 0.28, 0.115, 0.5);
  lctx.closePath();
}

function drawPin(x, yCenter, s, rot, alpha, glow) {
  lctx.save();
  lctx.translate(x, yCenter);
  if (rot) lctx.rotate(rot);
  lctx.scale(s, s);
  lctx.globalAlpha = alpha;
  pinPath();
  const g = lctx.createLinearGradient(-0.22, 0, 0.24, 0);
  g.addColorStop(0, "#ffffff");
  g.addColorStop(0.55, "#e7ebf3");
  g.addColorStop(1, "#96a1ba");
  lctx.fillStyle = g;
  if (glow) { lctx.shadowColor = "rgba(45, 212, 191, 0.45)"; lctx.shadowBlur = 10; }
  lctx.fill();
  lctx.shadowBlur = 0;
  lctx.clip();
  lctx.fillStyle = "rgba(239, 68, 68, 0.92)";
  lctx.fillRect(-0.2, -0.225, 0.4, 0.05);
  lctx.fillRect(-0.2, -0.15, 0.4, 0.042);
  const rim = lctx.createLinearGradient(0.02, 0, 0.24, 0);
  rim.addColorStop(0, "rgba(45, 212, 191, 0)");
  rim.addColorStop(1, "rgba(45, 212, 191, 0.22)");
  lctx.fillStyle = rim;
  lctx.fillRect(-0.3, -0.5, 0.6, 1);
  lctx.restore();
}

function drawBall(b) {
  const r = geom.ballR;
  b.trail.forEach(([tx, ty], k) => {
    lctx.globalAlpha = (k / b.trail.length) * 0.34;
    lctx.beginPath(); lctx.arc(tx, ty, r * 0.9 * (k / b.trail.length), 0, Math.PI * 2);
    lctx.fillStyle = `hsl(${(168 + k * 16 + lane.t * 70) % 360} 85% 64%)`;  // rainbow comet
    lctx.fill();
  });
  lctx.globalAlpha = 1;
  /* glow on the boards under the ball */
  lctx.save();
  lctx.globalAlpha = 0.16;
  lctx.beginPath();
  lctx.ellipse(b.x, b.y + r * 1.7, r * 1.15, r * 0.3, 0, 0, Math.PI * 2);
  lctx.fillStyle = "#2dd4bf"; lctx.fill();
  lctx.restore();
  const g = lctx.createRadialGradient(b.x - r * 0.35, b.y - r * 0.35, r * 0.1, b.x, b.y, r * 1.05);
  g.addColorStop(0, "#7df3e1");
  g.addColorStop(0.45, "#14b8a6");
  g.addColorStop(1, "#0b4f4a");
  lctx.beginPath(); lctx.arc(b.x, b.y, r, 0, Math.PI * 2);
  lctx.fillStyle = g;
  lctx.shadowColor = "rgba(45, 212, 191, 0.85)"; lctx.shadowBlur = 22;
  lctx.fill(); lctx.shadowBlur = 0;
  /* finger holes spin with the ball */
  lctx.save();
  lctx.translate(b.x, b.y); lctx.rotate(b.rot);
  lctx.fillStyle = "rgba(4, 30, 28, 0.85)";
  for (const a of [-0.5, 0.5, Math.PI / 2]) {
    lctx.beginPath();
    lctx.arc(Math.cos(a) * r * 0.42, Math.sin(a) * r * 0.42, r * 0.11, 0, Math.PI * 2);
    lctx.fill();
  }
  lctx.restore();
}

function laneDraw() {
  const { W, H, CX, base, PIN_POS, deckTopY, halfTop, halfBottom, gutterW } = geom;
  lctx.clearRect(0, 0, W, H);
  lctx.save();
  if (lane.shake > 0.3) {
    lctx.translate((Math.random() - 0.5) * lane.shake, (Math.random() - 0.5) * lane.shake);
  }

  /* room */
  const room = lctx.createLinearGradient(0, 0, 0, H);
  room.addColorStop(0, "#070b16");
  room.addColorStop(0.5, "#05070d");
  room.addColorStop(1, "#080b14");
  lctx.fillStyle = room;
  lctx.fillRect(-20, -20, W + 40, H + 40);
  /* glow behind the pin deck */
  const pit = lctx.createRadialGradient(CX, deckTopY, 10, CX, deckTopY, W * 0.45);
  pit.addColorStop(0, "rgba(45, 212, 191, 0.10)");
  pit.addColorStop(1, "rgba(45, 212, 191, 0)");
  lctx.fillStyle = pit;
  lctx.fillRect(0, 0, W, H * 0.6);

  /* ambient neon specks drifting through the room */
  for (const sp of AMBIENT) {
    sp.fy -= sp.speed * 0.016;
    if (sp.fy < -0.02) { sp.fy = 1.02; sp.fx = Math.random(); }
    lctx.globalAlpha = 0.16 + 0.14 * Math.sin(lane.t * 1.8 + sp.phase);
    lctx.fillStyle = sp.color;
    lctx.beginPath();
    lctx.arc(sp.fx * W, sp.fy * H, sp.size, 0, Math.PI * 2);
    lctx.fill();
  }
  lctx.globalAlpha = 1;

  /* gutters */
  lctx.fillStyle = "#03040a";
  for (const side of [-1, 1]) {
    lctx.beginPath();
    lctx.moveTo(CX + side * halfBottom, H);
    lctx.lineTo(CX + side * (halfBottom + gutterW * 1.7), H);
    lctx.lineTo(CX + side * (halfTop + gutterW), deckTopY);
    lctx.lineTo(CX + side * halfTop, deckTopY);
    lctx.closePath(); lctx.fill();
  }

  /* lane bed */
  const wood = lctx.createLinearGradient(0, H, 0, deckTopY);
  wood.addColorStop(0, "#1b1430");
  wood.addColorStop(0.55, "#141327");
  wood.addColorStop(1, "#0e1524");
  lctx.beginPath();
  lctx.moveTo(CX - halfBottom, H);
  lctx.lineTo(CX + halfBottom, H);
  lctx.lineTo(CX + halfTop, deckTopY);
  lctx.lineTo(CX - halfTop, deckTopY);
  lctx.closePath();
  lctx.fillStyle = wood; lctx.fill();

  /* board seams */
  lctx.strokeStyle = "rgba(255,255,255,0.05)"; lctx.lineWidth = 1;
  for (let k = 1; k < 10; k++) {
    const f = k / 10 - 0.5;
    lctx.beginPath();
    lctx.moveTo(CX + f * 2 * halfBottom * 0.96, H);
    lctx.lineTo(CX + f * 2 * halfTop * 0.96, deckTopY);
    lctx.stroke();
  }
  /* glossy sheen down the middle */
  lctx.save();
  lctx.beginPath();
  lctx.moveTo(CX - halfBottom, H); lctx.lineTo(CX + halfBottom, H);
  lctx.lineTo(CX + halfTop, deckTopY); lctx.lineTo(CX - halfTop, deckTopY);
  lctx.closePath(); lctx.clip();
  const sheen = lctx.createLinearGradient(0, deckTopY, 0, H);
  sheen.addColorStop(0, "rgba(255,255,255,0.07)");
  sheen.addColorStop(0.7, "rgba(255,255,255,0)");
  lctx.fillStyle = sheen;
  lctx.fillRect(CX - halfTop * 1.2, deckTopY, halfTop * 2.4, H - deckTopY);
  lctx.restore();

  /* aiming arrows (pulsing) + dots */
  const ARROWS = [[0, 0], [-0.3, 0.05], [0.3, 0.05], [-0.6, 0.10], [0.6, 0.10]];
  ARROWS.forEach(([ox, oy], i) => {
    const y = geom.arrowsY + oy * H, hw = laneHalf(y);
    const x = CX + ox * hw;
    const a = base * 0.11;
    lctx.fillStyle = `rgba(45, 212, 191, ${0.20 + 0.14 * Math.sin(lane.t * 2.2 + i * 1.3)})`;
    lctx.beginPath();
    lctx.moveTo(x, y - a * 1.6); lctx.lineTo(x - a, y + a); lctx.lineTo(x + a, y + a);
    lctx.closePath(); lctx.fill();
  });
  lctx.fillStyle = "rgba(45, 212, 191, 0.22)";
  for (const ox of [-0.45, -0.225, 0, 0.225, 0.45]) {
    const y = geom.dotsY, hw = laneHalf(y);
    lctx.beginPath(); lctx.arc(CX + ox * hw, y, base * 0.06, 0, Math.PI * 2); lctx.fill();
  }

  /* neon rails */
  lctx.lineWidth = 2.5;
  lctx.strokeStyle = "rgba(45, 212, 191, 0.55)";
  lctx.shadowColor = "rgba(45, 212, 191, 0.9)"; lctx.shadowBlur = 12;
  for (const side of [-1, 1]) {
    lctx.beginPath();
    lctx.moveTo(CX + side * (halfBottom + gutterW * 1.7), H);
    lctx.lineTo(CX + side * (halfTop + gutterW), deckTopY);
    lctx.stroke();
  }
  lctx.shadowBlur = 0;

  /* sparks */
  for (const p of lane.sparks) {
    lctx.globalAlpha = Math.max(0, Math.min(1, p.life * 3));
    lctx.fillStyle = "#ccfbf1";
    lctx.fillRect(p.x, p.y, 3, 3);
  }
  lctx.globalAlpha = 1;

  /* pin shadows */
  lctx.fillStyle = "rgba(0, 0, 0, 0.5)";
  for (let i = 0; i < 10; i++) {
    if (!lane.up[i] || lane.pop[i] <= 0) continue;
    const p = PIN_POS[i];
    lctx.save();
    lctx.globalAlpha = 0.45 * Math.min(1, lane.pop[i]);
    lctx.beginPath();
    lctx.ellipse(p.x, p.y + p.s * 0.03, p.s * 0.2, p.s * 0.055, 0, 0, Math.PI * 2);
    lctx.fill();
    lctx.restore();
  }

  /* flying pins */
  for (const p of lane.flying) {
    drawPin(p.x, p.y, p.s * Math.max(0.6, p.life), p.rot, Math.max(0, Math.min(1, p.life)), false);
  }

  /* standing pins, back to front */
  for (let i = 9; i >= 0; i--) {
    if (!lane.up[i]) continue;
    const pop = lane.pop[i];
    if (pop <= 0) continue;
    const p = PIN_POS[i];
    const over = pop < 1 ? 1.35 - 0.35 * pop : 1;
    const wob = 1 + Math.sin(lane.t * 2.1 + i * 1.7) * 0.012;
    drawPin(p.x, p.y - p.s * 0.5, p.s * pop * over * wob, 0, Math.min(1, pop * 1.5), true);
  }

  /* pinsetter sweep bar */
  if (lane.rackAnim) {
    const age = (lane.t - lane.rackAnim.start) * SPEED;
    const barH = base * 0.55;
    const restY = deckTopY - base * 0.55;
    let barY;
    if (age < 0.26) barY = -barH + (restY + barH) * (age / 0.26);
    else if (age < 0.52) barY = restY;
    else barY = restY - (restY + barH) * ((age - 0.52) / 0.33);
    lctx.fillStyle = "#0b1120";
    lctx.strokeStyle = "rgba(45, 212, 191, 0.7)";
    lctx.lineWidth = 2;
    const bw = (halfTop + gutterW) * 2;
    lctx.beginPath();
    if (lctx.roundRect) lctx.roundRect(CX - bw / 2, barY, bw, barH, 8);
    else lctx.rect(CX - bw / 2, barY, bw, barH);
    lctx.fill(); lctx.stroke();
  }

  /* ball */
  if (lane.ball) drawBall(lane.ball);

  /* confetti */
  for (const p of lane.confetti) {
    lctx.save();
    lctx.translate(p.x, p.y); lctx.rotate(p.rot);
    lctx.globalAlpha = Math.max(0, Math.min(1, p.life));
    lctx.fillStyle = p.color;
    lctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
    lctx.restore();
  }

  /* splash text */
  if (lane.splash) {
    const age = lane.t - lane.splash.born;
    const k = Math.min(1, age * 5);
    /* easeOutBack: 0 at k=0, overshoots, settles at 1 */
    const eased = 1 + 2.70158 * Math.pow(k - 1, 3) + 1.70158 * Math.pow(k - 1, 2);
    const scale = 0.4 + 0.6 * eased;
    const alpha = age > 0.85 ? Math.max(0, 1 - (age - 0.85) / 0.35) : 1;
    const fs = Math.round(Math.max(30, Math.min(62, H * 0.058)));
    lctx.save();
    lctx.translate(CX, geom.splashY); lctx.scale(scale, scale);
    lctx.globalAlpha = alpha;
    lctx.font = `800 ${fs}px Inter, sans-serif`;
    lctx.textAlign = "center"; lctx.textBaseline = "middle";
    lctx.shadowColor = lane.splash.color; lctx.shadowBlur = 26;
    lctx.fillStyle = lane.splash.color;
    lctx.fillText(lane.splash.text, 0, 0);
    lctx.restore();
  }
  lctx.restore();
}

let lastFrameT = performance.now();
(function loop(now) {
  const dt = Math.min((now - lastFrameT) / 1000, 0.05);
  lastFrameT = now;
  laneTick(dt);
  laneDraw();
  requestAnimationFrame(loop);
})(lastFrameT);

/* ------------------------------------------------ rendering */
const scorecardEl = document.getElementById("scorecard");
const totalEl = document.getElementById("totalval");
const statusEl = document.getElementById("status");

function rollBox(sym) {
  const mark = sym && (sym.toUpperCase() === "X" || sym === "/");
  return `<div class="rollbox${mark ? " mark" : ""}">${sym ? sym.toUpperCase() : ""}</div>`;
}

let prevScores = Array(10).fill(null);

function render() {
  const a = analyze(state.rolls);
  const scores = state.ready ? pyPartialScores(state.rolls) : Array(10).fill(null);

  scorecardEl.innerHTML = a.frames.map((fr, f) => {
    const n = f === 9 ? 3 : 2;
    const boxes = Array.from({ length: n }, (_, r) => rollBox(fr[r]));
    const active = !a.done && f === a.frameIdx;
    const cum = scores[f];
    const pop = cum !== null && prevScores[f] !== cum ? " pop" : "";
    return `<div class="frame${active ? " active" : ""}">
      <div class="num">${f + 1}</div>
      <div class="rolls">${boxes.join("")}</div>
      <div class="cum${cum === null ? " pending" : ""}${pop}">${cum === null ? (fr.length ? "…" : "") : cum}</div>
    </div>`;
  }).join("");
  prevScores = scores.slice();

  /* keep the glowing frame centered when the scorecard scrolls (small screens) */
  const act = scorecardEl.querySelector(".frame.active");
  if (act) {
    const sc = scorecardEl.parentElement;
    const target = Math.max(0, act.offsetLeft - (sc.clientWidth - act.offsetWidth) / 2);
    if (Math.abs(sc.scrollLeft - target) > 8) sc.scrollLeft = target;
  }

  const lastScore = [...scores].reverse().find(s => s !== null);
  const newTotal = String(lastScore ?? 0);
  if (totalEl.textContent !== newTotal) {
    totalEl.textContent = newTotal;
    totalEl.classList.remove("pop");
    void totalEl.offsetWidth;              // restart the pop animation
    totalEl.classList.add("pop");
  }

  const lock = !state.ready || lane.busy;
  document.querySelectorAll("[data-digit]").forEach(btn => {
    const d = Number(btn.dataset.digit);
    btn.disabled = lock || a.done || (a.fresh ? false : d > a.standing - 1);
  });
  document.getElementById("key-x").disabled = lock || a.done || !a.fresh;
  document.getElementById("key-slash").disabled = lock || a.done || a.fresh;
  document.getElementById("key-undo").disabled = lock || state.rolls.length === 0;
  document.getElementById("key-reset").disabled = lock || state.rolls.length === 0;
  document.querySelectorAll(".chip").forEach(c => c.disabled = lock);

  statusEl.className = "";
  if (!state.ready) statusEl.textContent = "";
  else if (a.done) {
    const res = pyFinalScore(state.rolls);
    if (!res.ok) { statusEl.className = "error"; statusEl.textContent = "⚠ " + res.error; }
    else if (res.scores[9] === 300) {
      statusEl.className = "perfect"; statusEl.textContent = "★ PERFECT GAME — 300! ★";
      const key = state.rolls.join(",");
      if (lastCelebrated !== key) {
        lastCelebrated = key;
        laneSplash("PERFECT!", "#f59e0b");
        confettiBurst(80);
        lane.stormUntil = lane.t + 2.6;
      }
    }
    else {
      statusEl.className = "done";
      statusEl.textContent = `Game over — you scored ${res.scores[9]}! 🎉 (checked by score_game ✓)`;
    }
  }
  else if (state.rolls.length === 0) statusEl.textContent = "Tap a number to roll your first ball!";
  else if (a.fresh) statusEl.textContent = `Frame ${a.frameIdx + 1} — new pins. Roll it!`;
  else statusEl.textContent = `${a.standing} pin${a.standing === 1 ? "" : "s"} left — clear them for a spare /`;
}

function syncLaneToState() {
  const a = analyze(state.rolls);
  laneSync(a.done || a.fresh ? 10 : a.standing);
}

/* ------------------------------------------------ input */
function addRoll(sym) {
  if (!state.ready || lane.busy) return;
  const a = analyze(state.rolls);
  if (a.done) return;
  const s = sym.toUpperCase() === "X" ? "X" : sym;
  if (s === "X" && !a.fresh) return;
  if (s === "/" && a.fresh) return;
  if (/^\d$/.test(s) && !a.fresh && Number(s) > a.standing - 1) return;

  const standingBefore = a.fresh ? 10 : a.standing;
  state.rolls.push(s);
  const after = analyze(state.rolls);

  laneRoll(s, standingBefore,
    () => render(),                       // impact: scorecard catches up
    () => {                               // pins settled
      if (!after.done && after.fresh) {
        laneRack();
        setTimeout(() => { lane.busy = false; render(); }, RACK_SECS * 1000);
      } else {
        lane.busy = false;
      }
      render();
    });
  render();                               // lock the pad while the ball rolls
}

const digitrow = document.getElementById("digitrow");
for (let d = 0; d <= 9; d++) {
  const b = document.createElement("button");
  b.className = "key"; b.textContent = d; b.dataset.digit = d; b.disabled = true;
  b.addEventListener("click", () => addRoll(String(d)));
  digitrow.appendChild(b);
}
document.getElementById("key-x").addEventListener("click", () => addRoll("X"));
document.getElementById("key-slash").addEventListener("click", () => addRoll("/"));
document.getElementById("key-undo").addEventListener("click", () => {
  if (lane.busy) return;
  state.rolls.pop(); lastCelebrated = ""; syncLaneToState(); render();
});
document.getElementById("key-reset").addEventListener("click", () => {
  if (lane.busy) return;
  state.rolls = []; lastCelebrated = ""; syncLaneToState(); render();
});
document.querySelectorAll(".chip").forEach(c =>
  c.addEventListener("click", () => {
    if (lane.busy) return;
    state.rolls = [...GAMES[c.dataset.game]];
    lastCelebrated = "";
    syncLaneToState(); render();
  }));

document.addEventListener("keydown", e => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;           // don't hijack browser shortcuts
  if (e.key >= "0" && e.key <= "9") addRoll(e.key);
  else if (e.key === "x" || e.key === "X") addRoll("X");
  else if (e.key === "/") { e.preventDefault(); addRoll("/"); }
  else if (e.key === "Backspace" && !lane.busy) { state.rolls.pop(); lastCelebrated = ""; syncLaneToState(); render(); }
});

/* ------------------------------------------------ tests */
const termEl = document.getElementById("term");
const badgeEl = document.getElementById("testbadge");
const runBtn = document.getElementById("runtests");

runBtn.addEventListener("click", async () => {
  if (!state.ready) return;
  runBtn.disabled = true;
  runBtn.textContent = "Running…";
  termEl.style.display = "block";
  termEl.textContent = micropipReady ? "collecting tests…" : "installing pytest (first run only)…";
  badgeEl.className = "badge";
  try {
    if (!micropipReady) {
      await pyodide.loadPackage("micropip");
      await pyodide.runPythonAsync(`import micropip; await micropip.install("pytest")`);
      micropipReady = true;
    }
    pyodide.FS.writeFile("test_bowling.py", testSource);
    const res = JSON.parse(pyodide.runPython("run_tests()"));
    termEl.innerHTML = res.output
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/\bPASSED\b/g, '<span class="pass">PASSED</span>')
      .replace(/\bFAILED\b/g, '<span class="fail">FAILED</span>')
      .replace(/(\d+ passed[^\n]*)/g, '<span class="pass">$1</span>');
    const m = res.output.match(/(\d+) passed/);
    if (res.code === 0) { badgeEl.className = "badge pass"; badgeEl.textContent = `✓ ${m ? m[1] : "all"} passed`; }
    else { badgeEl.className = "badge fail"; badgeEl.textContent = "✗ failures"; }
  } catch (err) {
    termEl.textContent = "Could not run tests: " + err;
    badgeEl.className = "badge fail"; badgeEl.textContent = "✗ error";
  }
  runBtn.disabled = false;
  runBtn.textContent = "▶ Run pytest";
});

/* ------------------------------------------------ boot */
(async () => {
  render(); // skeleton while loading
  let py, bowlingSrc, testSrc;
  try {
    [py, bowlingSrc, testSrc] = await Promise.all([
      loadPyodide(),
      fetch("bowling.py").then(r => { if (!r.ok) throw new Error("bowling.py " + r.status); return r.text(); }),
      fetch("test_bowling.py").then(r => { if (!r.ok) throw new Error("test_bowling.py " + r.status); return r.text(); }),
    ]);
  } catch (err) {
    const loader = document.getElementById("loader");
    loader.innerHTML = `<div style="text-align:center;max-width:420px;padding:0 20px">
      ⚠ Couldn't load the Python runtime.<br>
      <span style="color:var(--ink-dim);font-size:13px;font-weight:500">Check your internet connection, then try again. (${String(err).slice(0, 120)})</span><br>
      <button onclick="location.reload()" style="margin-top:14px;padding:10px 22px;border-radius:11px;border:none;cursor:pointer;
        background:linear-gradient(92deg,#2dd4bf,#14b8a6);color:#052e2b;font-weight:700;font-size:14px">↻ Reload</button>
    </div>`;
    return;
  }
  pyodide = py;
  testSource = testSrc;
  pyodide.FS.writeFile("bowling.py", bowlingSrc);
  pyodide.runPython(`
import json
from bowling import score_game, _to_pin_counts

def partial_scores(rolls):
    """Cumulative score per frame for an in-progress game; None = not yet scoreable."""
    scores = [None] * 10
    if not rolls:
        return scores
    pins = _to_pin_counts(rolls)
    n = len(pins)
    total = 0
    roll = 0
    for frame in range(10):
        if roll >= n:
            break
        if frame == 9:
            first = pins[roll]
            have = n - roll
            if first == 10 or (have >= 2 and first + pins[roll + 1] == 10):
                needed = 3
            else:
                needed = 2
            if have >= needed:
                total += sum(pins[roll:roll + needed])
                scores[9] = total
            break
        if pins[roll] == 10:                      # strike
            if roll + 2 < n:
                total += 10 + pins[roll + 1] + pins[roll + 2]
                scores[frame] = total
                roll += 1
            else:
                break
        elif roll + 1 < n:
            frame_pins = pins[roll] + pins[roll + 1]
            if frame_pins == 10:                  # spare
                if roll + 2 < n:
                    total += 10 + pins[roll + 2]
                    scores[frame] = total
                    roll += 2
                else:
                    break
            else:                                 # open frame
                total += frame_pins
                scores[frame] = total
                roll += 2
        else:
            break
    return scores

def ui_score(rolls):
    try:
        return {"ok": True, "scores": score_game(rolls)}
    except ValueError as exc:
        return {"ok": False, "error": str(exc)}

def run_tests():
    import io, contextlib, pytest
    buf = io.StringIO()
    with contextlib.redirect_stdout(buf), contextlib.redirect_stderr(buf):
        code = pytest.main(["-v", "--color=no", "-p", "no:cacheprovider", "test_bowling.py"])
    return json.dumps({"code": int(code), "output": buf.getvalue()})
`);
  state.ready = true;
  const loader = document.getElementById("loader");
  loader.style.opacity = "0";
  setTimeout(() => loader.remove(), 400);
  render();
})();
</script>
